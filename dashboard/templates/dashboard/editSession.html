<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Session</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: rgba(15, 23, 42, 0.95);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    box-sizing: border-box;
}

/* SMALL MODAL CARD */
.card {
    width: 100%;
    max-width: 320px;
    background: #ffffff;
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
}

/* HEADER */
.card h3 {
    margin: 0 0 12px 0;
    font-size: 16px;
    text-align: center;
    color: #0f172a;
}

/* FORM */
form {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* INPUTS */
input, select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
}

input:focus, select:focus, textarea:focus {
    border-color: #4f46e5;
}

/* BUTTON */
button {
    background: #4f46e5;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #4338ca;
}

/* CANCEL / BACK */
.back {
    display: block;
    text-align: center;
    margin-top: 8px;
    font-size: 12px;
    color: #64748b;
    text-decoration: none;
}

.back:hover {
    color: #0f172a;
}
</style>

</head>

<body>

<div class="card">

    <h3>✏️ Edit Session</h3>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Update</button>
    </form>

    <a href="{% url 'dashboard' %}" class="back">Cancel</a>

</div>

</body>
</html>
