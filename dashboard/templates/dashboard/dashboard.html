<head>
<meta charset="UTF-8">
<title>Gaming Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f8fafc;
    color: #1e293b;
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #111827;
    color: white;
    height: 100vh;
    padding: 20px;
    flex-shrink: 0;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    padding: 10px;
    margin: 10px 0;
    color: #cbd5f5;
    text-decoration: none;
    border-radius: 8px;
}

.sidebar a:hover {
    background: #1f2937;
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
    box-sizing: border-box;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

/* BUTTON */
.btn {
    background: #4f46e5;
    color: white;
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.card h4 {
    color: #64748b;
}

.green { color: #16a34a; }
.red { color: #dc2626; }

/* CHART */
.chart-box {
    background: white;
    padding: 20px;
    margin-top: 30px;
    border-radius: 12px;
}

canvas {
    max-width: 100%;
}

/* TABLE */
.table-box {
    margin-top: 30px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 400px;
}

th {
    background: #f1f5f9;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #e2e8f0;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    top: 0;
    left: 0;
}

.modal-content {
    background: white;
    width: 90%;
    max-width: 400px;
    margin: 10% auto;
    padding: 20px;
    border-radius: 12px;
}

/* RESPONSIVE RULES */
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }
    .sidebar {
        width: 100%;
        height: auto;
        position: relative;
    }
    .main {
        padding: 15px;
    }
    .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }
}
</style>
</head>
