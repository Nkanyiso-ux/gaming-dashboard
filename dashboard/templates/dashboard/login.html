<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    font-family: Arial;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box{
    background: white;
    padding:30px;
    border-radius: 12px;
    width: 300px;

}

input{
    width: 100%;
    padding:10px;
    margin: 10px 0;
}

button{
    width: 100%;
    padding: 10px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>
</head>   

<body>

<div class="box">
    <h2>Login</h2>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {%endif%}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username">
        <input type="password" name="password" placeholder="Password">
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
