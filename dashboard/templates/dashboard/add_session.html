<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #ecedef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            width: 400px;
        }
        h2 {
            margin-bottom: 20px;
            color: #4f46e5;
            text-align: center;
        }
        button {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #4338ca;
        }
        .errorlist {
            color: red;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Add Session</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            {% if form.errors %}
                <div class="errorlist">
                    {{ form.errors }}
                </div>
            {% endif %}

            <button type="submit">Save</button>
        </form>
    </div>
</body>
</html>
