<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overview</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ecedef;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #0e1b36;
    color: white;
    height: 100vh;
    padding: 15px;
    position: fixed;
}

.sidebar h2 {
    margin-bottom: 50px;
}

.sidebar a {
    display: block;
    padding: 20px;
    margin: 15px 0;
    color: #cbd5f5;
    text-decoration: none;
    border-radius: 8px;
}

.sidebar a:hover,
.sidebar a.active {
    background: #4f46e5;
    color: white;
}

/* MAIN CONTENT */
.main {
    margin-left: 260px;
    padding: 20px;
    width: 100%;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 20px;
}

.card {
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* COLORS */
.card:nth-child(1){
    background: #E3F2FD;
    border-left: 5px solid #2196F3;
}
.card:nth-child(2) {
    background: #FFFFFF;
    border-left:5px solid #757575;
}
.card:nth-child(3) {
    background: #E8F5E9;
    border-left:5px solid #4CAF50;
}
.card:nth-child(4) {
    background: #FFF8E1;
    border-left:5px solid #FFC107;
}

.green { color: #1B5E20; font-weight: 700;}
.red { color: #B71C1C; font-weight: 700; }

/* CHART BOX */
.chart-box {
    background: white;
    padding: 20px;
    margin-top: 30px;
    border-radius: 12px;
}
/* MOBILE */
@media(max-width:768px){

    body {
        flex-direction: column;
    }

    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        display: flex;
        justify-content: space-around;
    }

    .sidebar h2 {
        display: none;
    }

    .main {
        margin-left: 0;
        padding: 15px;
    }

    .cards {
        grid-template-columns: 1fr;
    }

    canvas {
        height: 250px !important;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎮 Dashboard</h2>

    <a href="{% url 'overview' %}" class="{% if request.path == '/' %}active{% endif %}">
        📊 Overview
    </a>

    <a href="{% url 'dashboard' %}" class="{% if request.path == '/sessions/' %}active{% endif %}">
        📋 Sessions
    </a>
</div>

<!-- MAIN -->
<div class="main">

    <h1>📊 Overview Dashboard</h1>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">Sessions: {{ total_sessions }}</div>

        <div class="card">
            Profit:
            <span class="{% if total_profit > 0 %}green{% else %}red{% endif %}">
                R{{ total_profit }}
            </span>
        </div>

        <div class="card">Win Rate: {{ win_rate }}%</div>
        <div class="card">Biggest Win: R{{ biggest_win }}</div>
    </div>

    <!-- CHART -->
    <div class="chart-box">
        <h2>📈 Profit Trend</h2>
        <canvas id="chart"></canvas>
    </div>

</div>

<!-- JS -->
<script>
const ctx = document.getElementById('chart').getContext('2d');

const gradient = ctx.createLinearGradient(0, 0, 0, 300);
gradient.addColorStop(0, "rgba(79, 70, 229, 0.4)");
gradient.addColorStop(1, "rgba(79, 70, 229, 0)");

new Chart(ctx, {
    type: 'line',
    data: {
        labels: {{ dates|safe }},
        datasets: [{
            label: 'Profit',
            data: {{ profits|safe }},
            borderColor: "#4f46e5",
            backgroundColor: gradient,
            borderWidth: 3,
            tension: 0.4,
            fill: true
        }]
    },
    options: {
        plugins: {
            legend: { display: false }
        }
    }
});
</script>

</body>
</html>
